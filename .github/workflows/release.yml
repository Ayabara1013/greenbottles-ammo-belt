name: Release Module

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build compendium packs from source
        run: |
          npm install -g @foundryvtt/foundryvtt-cli
          mkdir -p packs
          # Same source builds both the PF2e and SF2e packs (one per system —
          # Foundry packs can't span systems, so we ship one for each).
          fvtt package pack greenbottles-ammo-belt \
            --in src/packs/greenbottles-ammo-belt \
            --out packs \
            --id greenbottles-ammo-belt \
            --type Module
          fvtt package pack greenbottles-ammo-belt-sf2e \
            --in src/packs/greenbottles-ammo-belt \
            --out packs \
            --id greenbottles-ammo-belt \
            --type Module

      - name: Create module.zip
        run: zip -r ./module.zip module.json scripts/ templates/ icons/ packs/

      - name: Upload Assets to Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: './module.zip,./module.json'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Submit to Foundry Package Registry
        env:
          FVTT_PACKAGE_TOKEN: ${{ secrets.FVTT_PACKAGE_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          curl -f -X POST https://api.foundryvtt.com/_api/packages/release_version/ \
            -H "Authorization: $FVTT_PACKAGE_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"id\": \"greenbottles-ammo-belt\",
              \"release\": {
                \"version\": \"$VERSION\",
                \"manifest\": \"https://github.com/Ayabara1013/greenbottles-ammo-belt/releases/download/${GITHUB_REF_NAME}/module.json\",
                \"notes\": \"https://github.com/Ayabara1013/greenbottles-ammo-belt/releases/tag/${GITHUB_REF_NAME}\",
                \"compatibility\": {
                  \"minimum\": \"13\",
                  \"verified\": \"14\"
                }
              }
            }"
